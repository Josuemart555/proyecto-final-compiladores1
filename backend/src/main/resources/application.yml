spring:
  application:
    name: compilador-api
  threads:
    virtual:
      enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  show-actuator: false

server:
  shutdown: graceful

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.compiladores.api: INFO

application:
  name: Compilador SQL API
  description: API REST base para el proyecto final de compiladores
