services:
  compilador-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: compilador-sql-api
    working_dir: /app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8080
    volumes:
      - .:/app
      - maven-cache:/root/.m2
      - spring-target:/app/target
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  maven-cache:
  spring-target:
